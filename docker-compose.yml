services:

  redis:
    image: redis:latest
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
  app:
    build: .
    container_name: ecommerce-api
    ports:
      - "8080:8080"
    environment:
      - MAX_BUCKET_SIZE=${MAX_BUCKET_SIZE}
      - BUCKET_REPLISHMENT=${BUCKET_REPLISHMENT}
    restart: unless-stopped

volumes:
  redis-data: